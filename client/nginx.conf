server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin"     always;
    add_header X-XSS-Protection        "1; mode=block"     always;

    # Proxy API calls to the backend — API_SERVER is injected at container start via envsubst
    location /api/ {
        proxy_pass          ${API_SERVER}/api/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # Proxy uploaded files to the backend
    location /uploads/ {
        proxy_pass          ${API_SERVER}/uploads/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Cache static assets
    location ~* \.(js|css|woff2?|ttf|otf|svg|ico|png|jpg|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # Health endpoint for Docker HEALTHCHECK
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
