version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crm_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-crm_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-superrefreshsecretkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: ${PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      UPLOAD_DIR: /app/uploads
    ports:
      - '4000:4000'
    volumes:
      - uploads_data:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crm_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - '5173:80'

volumes:
  postgres_data:
  uploads_data:
